apiVersion: apps/v1
kind: Deployment
metadata:
  name: cspm-ui
  namespace: cspm-ui
  labels:
    app: cspm-ui
spec:
  replicas: 2
  selector:
    matchLabels:
      app: cspm-ui
  template:
    metadata:
      labels:
        app: cspm-ui
    spec:
      containers:
        - name: cspm-ui
          image: ayushajha/cspm-ui:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
          envFrom:
            - secretRef:
                name: cspm-ui-env

          resources:
            requests:
              cpu: "25m"
              memory: "64Mi"
            limits:
              cpu: "250m"
              memory: "256Mi"

          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 20

          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: cspm-ui
  namespace: cspm-ui
spec:
  selector:
    app: cspm-ui
  ports:
    - port: 80
      targetPort: 3000
  type: LoadBalancer
